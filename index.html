<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Destination Lookup</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Mobile-First CSS Variables & Reset */
        :root {
            --primary-bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --accent-color: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto; 
            background-color: var(--primary-bg); 
            color: var(--text-main); 
        }

        h1 { 
            text-align: center; 
            font-size: 1.5rem; 
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .control-group { 
            margin-bottom: 16px; 
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            color: var(--text-main);
            font-size: 0.9rem;
        }

        select { 
            width: 100%; 
            padding: 16px; 
            font-size: 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background-color: var(--card-bg); 
            color: var(--text-main);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%22%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
            display: none; 
            overflow: hidden;
            margin-top: 24px;
        }

        .card.active { 
            display: block; 
            animation: fadeIn 0.3s ease-in-out;
        }

        .detail-row { 
            border-bottom: 1px solid var(--border-color); 
            padding: 16px 20px; 
            display: flex; 
            flex-direction: column; 
        }

        .detail-row:last-child { 
            border-bottom: none; 
        }

        .detail-label { 
            font-weight: 600; 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px; 
        }

        .detail-value { 
            font-size: 1.1rem; 
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* Large touch-friendly link styling for drivers */
        .driver-link {
            display: inline-block;
            color: #ffffff;
            background-color: var(--accent-color);
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 4px;
            text-align: center;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        .driver-link:active {
            background-color: #1d4ed8;
        }

        .loading { 
            text-align: center; 
            padding: 40px 20px; 
            font-size: 1.1rem;
            color: var(--text-muted); 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>Destination Details</h1>

    <div id="loading" class="loading">Loading latest routes...</div>

    <div id="ui-container" style="display: none;">
        <div class="control-group">
            <label for="categorySelect">1. Filter by Category</label>
            <select id="categorySelect">
                <option value="">-- Show All Categories --</option>
            </select>
        </div>

        <div class="control-group">
            <label for="locationSelect">2. Select Destination</label>
            <select id="locationSelect">
                <option value="">-- Tap to choose --</option>
            </select>
        </div>
    </div>

    <div id="detailsCard" class="card"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTwqgYrq_LwJQnjhfPGDnSHA1w2icHipIpiPl7HhTjSO5lCX0mcXNRT1dgn-Q353jcEPXiiURZRo7Kd/pub?gid=1069003853&single=true&output=csv';
        
        let globalData = [];
        let headers = [];
        let primaryKey = ''; // Will hold the first column header name dynamically

        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                globalData = results.data;
                headers = results.meta.fields;
                
                if (headers && headers.length > 0 && globalData.length > 0) {
                    primaryKey = headers[0]; // First column (e.g., 'NAME OF STOP')
                    initUI();
                } else {
                    document.getElementById('loading').innerText = 'No data found in the spreadsheet.';
                }
            },
            error: function(err) {
                document.getElementById('loading').innerText = 'Error parsing data.';
                console.error(err);
            }
        });

        function initUI() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('ui-container').style.display = 'block';

            populateCategoryDropdown();
            populateLocationDropdown(); // Initially load all locations

            // Setup Event Listeners
            document.getElementById('categorySelect').addEventListener('change', function() {
                populateLocationDropdown(this.value);
                document.getElementById('detailsCard').classList.remove('active'); // Hide card on filter change
            });

            document.getElementById('locationSelect').addEventListener('change', function() {
                const selectedIndex = this.value;
                if (selectedIndex === "") {
                    document.getElementById('detailsCard').classList.remove('active');
                } else {
                    displayDetails(globalData[selectedIndex]);
                }
            });
        }

        function populateCategoryDropdown() {
            const catSelect = document.getElementById('categorySelect');
            const categories = new Set();

            globalData.forEach(row => {
                // Find column matching 'CATEGORY' or similar casing variation
                const catValue = row['CATEGORY'] || row['Category'] || row['category'];
                if (catValue && catValue.trim() !== '') {
                    categories.add(catValue.trim());
                }
            });

            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                catSelect.appendChild(opt);
            });
        }

        function populateLocationDropdown(filterCategory = '') {
            const locSelect = document.getElementById('locationSelect');
            
            // Clear current options except the placeholder
            locSelect.innerHTML = '<option value="">-- Tap to choose --</option>';

            globalData.forEach((row, index) => {
                const locationName = row[primaryKey];
                const catValue = row['CATEGORY'] || row['Category'] || row['category'] || '';

                if (locationName && locationName.trim() !== '') {
                    // Check if filtering matches
                    if (filterCategory === '' || catValue.trim() === filterCategory) {
                        const option = document.createElement('option');
                        option.value = index; // Array reference index
                        option.textContent = locationName;
                        locSelect.appendChild(option);
                    }
                }
            });
        }

        function displayDetails(rowData) {
            const card = document.getElementById('detailsCard');
            card.innerHTML = ''; 

            headers.forEach(header => {
                const value = rowData[header];
                
                if (value !== undefined && value !== null && value.trim() !== '') {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'detail-row';
                    
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'detail-label';
                    labelDiv.textContent = header;
                    
                    const valueDiv = document.createElement('div');
                    valueDiv.className = 'detail-value';
                    
                    // Hyperlink Parsing Engine
                    const isLinkColumn = header.toUpperCase() === 'LINK' || header.toUpperCase() === 'URL';
                    const looksLikeUrl = value.startsWith('http://') || value.startsWith('https://') || value.includes('www.');

                    if (isLinkColumn || looksLikeUrl) {
                        const cleanUrl = value.startsWith('www.') ? 'https://' + value : value;
                        
                        const linkButton = document.createElement('a');
                        linkButton.href = cleanUrl;
                        linkButton.target = '_blank';
                        linkButton.className = 'driver-link';
                        linkButton.textContent = '🗺️ Open Map Navigation';
                        
                        valueDiv.appendChild(linkButton);
                    } else {
                        valueDiv.textContent = value;
                    }

                    rowDiv.appendChild(labelDiv);
                    rowDiv.appendChild(valueDiv);
                    card.appendChild(rowDiv);
                }
            });

            card.classList.add('active');
        }
    </script>
</body>
</html>
