<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Destination Lookup</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Mobile-First CSS Variables & Reset */
        :root {
            --primary-bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --accent-color: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto; 
            background-color: var(--primary-bg); 
            color: var(--text-main); 
        }

        h1 { 
            text-align: center; 
            font-size: 1.5rem; 
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .control-group { 
            margin-bottom: 16px; 
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            color: var(--text-main);
            font-size: 0.9rem;
        }

        select { 
            width: 100%; 
            padding: 16px; 
            font-size: 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background-color: var(--card-bg); 
            color: var(--text-main);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%22%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
        }

        #cardsContainer {
            margin-top: 24px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
            overflow: hidden;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .detail-row { 
            border-bottom: 1px solid var(--border-color); 
            padding: 16px 20px; 
            display: flex; 
            flex-direction: column; 
        }

        .detail-row:last-child { 
            border-bottom: none; 
        }

        .detail-label { 
            font-weight: 600; 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px; 
        }

        .detail-value { 
            font-size: 1.1rem; 
            line-height: 1.4;
            word-wrap: break-word;
        }

        .driver-link {
            display: inline-block;
            color: #ffffff;
            background-color: var(--accent-color);
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 4px;
            text-align: center;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        .driver-link:active {
            background-color: #1d4ed8;
        }

        .loading { 
            text-align: center; 
            padding: 40px 20px; 
            font-size: 1.1rem;
            color: var(--text-muted); 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>Destination Details</h1>

    <div id="loading" class="loading">Loading latest routes...</div>

    <div id="ui-container" style="display: none;">
        <div class="control-group">
            <label for="locationSelect">1. Select Destination</label>
            <select id="locationSelect">
                <option value="">-- Tap to choose destination --</option>
            </select>
        </div>

        <div class="control-group">
            <label for="categorySelect">2. Filter by Type of Stop</label>
            <select id="categorySelect" disabled>
                <option value="">-- Choose destination first --</option>
            </select>
        </div>
    </div>

    <div id="cardsContainer"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTwqgYrq_LwJQnjhfPGDnSHA1w2icHipIpiPl7HhTjSO5lCX0mcXNRT1dgn-Q353jcEPXiiURZRo7Kd/pub?gid=1069003853&single=true&output=csv';
        
        let globalData = [];
        let headers = [];
        let firstColumnHeader = ''; 
        let seventhColumnHeader = '';
        let secondColumnHeader = '';

        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                globalData = results.data;
                headers = results.meta.fields;
                
                if (headers && headers.length > 0 && globalData.length > 0) {
                    // Map headers precisely by exact column coordinates to prevent naming breakdown issues
                    firstColumnHeader = headers[0]; 
                    secondColumnHeader = headers[1] || 'NAME';
                    seventhColumnHeader = headers[6] || 'CATEGORY';
                    
                    initUI();
                } else {
                    document.getElementById('loading').innerText = 'No data found in the spreadsheet.';
                }
            },
            error: function(err) {
                document.getElementById('loading').innerText = 'Error parsing data.';
                console.error(err);
            }
        });

        function initUI() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('ui-container').style.display = 'block';

            populateLocationDropdown(); 

            // Setup Listeners
            document.getElementById('locationSelect').addEventListener('change', function() {
                const selectedLocationName = this.value;
                document.getElementById('cardsContainer').innerHTML = ''; 
                
                if (selectedLocationName === "") {
                    resetCategoryDropdown();
                } else {
                    populateCategoryDropdown(selectedLocationName);
                }
            });

            document.getElementById('categorySelect').addEventListener('change', function() {
                const selectedLocationName = document.getElementById('locationSelect').value;
                const selectedCategory = this.value;
                
                if (selectedLocationName !== "" && selectedCategory !== "") {
                    displayFilteredDetails(selectedLocationName, selectedCategory);
                } else {
                    document.getElementById('cardsContainer').innerHTML = '';
                }
            });
        }

        function populateLocationDropdown() {
            const locSelect = document.getElementById('locationSelect');
            locSelect.innerHTML = '<option value="">-- Tap to choose destination --</option>';

            const uniqueLocationNames = new Set();

            globalData.forEach(row => {
                const locationName = row[firstColumnHeader];
                if (locationName && locationName.trim() !== '') {
                    uniqueLocationNames.add(locationName.trim());
                }
            });

            uniqueLocationNames.forEach(locName => {
                const option = document.createElement('option');
                option.value = locName; 
                option.textContent = locName;
                locSelect.appendChild(option);
            });
        }

        function populateCategoryDropdown(selectedLocationName) {
            const catSelect = document.getElementById('categorySelect');
            catSelect.innerHTML = '<option value="">-- Select Type of Stop --</option>';
            catSelect.disabled = false;

            const associatedCategories = new Set();

            // Gather all 7th column options linked to the 1st column choice
            globalData.forEach(row => {
                const nameMatch = row[firstColumnHeader] && row[firstColumnHeader].trim() === selectedLocationName;
                if (nameMatch) {
                    const catValue = row[seventhColumnHeader];
                    if (catValue && catValue.trim() !== '') {
                        associatedCategories.add(catValue.trim());
                    }
                }
            });

            associatedCategories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                catSelect.appendChild(opt);
            });

            // If there's exactly one option, auto-select it for the driver
            if (associatedCategories.size === 1) {
                const singleCat = Array.from(associatedCategories)[0];
                catSelect.value = singleCat;
                displayFilteredDetails(selectedLocationName, singleCat);
            }
        }

        function resetCategoryDropdown() {
            const catSelect = document.getElementById('categorySelect');
            catSelect.innerHTML = '<option value="">-- Choose destination first --</option>';
            catSelect.disabled = true;
        }

        function displayFilteredDetails(targetLocationName, filterCategory) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = ''; 

            const matchingRows = globalData.filter(row => {
                const nameMatch = row[firstColumnHeader] && row[firstColumnHeader].trim() === targetLocationName;
                const catValue = row[seventhColumnHeader] || '';
                return nameMatch && catValue.trim() === filterCategory;
            });

            matchingRows.forEach(rowData => {
                const card = document.createElement('div');
                card.className = 'card';

                function createDetailRow(label, val) {
                    if (val !== undefined && val !== null && val.trim() !== '') {
                        const rowDiv = document.createElement('div');
                        rowDiv.className = 'detail-row';
                        
                        const labelDiv = document.createElement('div');
                        labelDiv.className = 'detail-label';
                        labelDiv.textContent = label;
                        
                        const valueDiv = document.createElement('div');
                        valueDiv.className = 'detail-value';
                        
                        const isLinkColumn = label.toUpperCase() === 'LINK' || label.toUpperCase() === 'URL';
                        const looksLikeUrl = val.startsWith('http://') || val.startsWith('https://') || val.includes('www.');

                        if (isLinkColumn || looksLikeUrl) {
                            const cleanUrl = val.startsWith('www.') ? 'https://' + val : val;
                            const linkButton = document.createElement('a');
                            linkButton.href = cleanUrl;
                            linkButton.target = '_blank';
                            linkButton.className = 'driver-link';
                            linkButton.textContent = '🗺️ Open Map Navigation';
                            valueDiv.appendChild(linkButton);
                        } else {
                            valueDiv.textContent = val;
                        }

                        rowDiv.appendChild(labelDiv);
                        rowDiv.appendChild(valueDiv);
                        card.appendChild(rowDiv);
                    }
                }

                // 1. Force the layout to show column 2 ('NAME') at the top of the card
                createDetailRow('NAME', rowData[secondColumnHeader]);

                // 2. Build and insert the consolidated Full Address row second
                const rawAddr = rowData['ADDRESS'] || rowData['Address'] || '';
                const rawCity = rowData['CITY'] || rowData['City'] || '';
                const rawState = rowData['STATE'] || rowData['State'] || '';

                let addressParts = [];
                if (rawAddr.trim()) addressParts.push(rawAddr.trim());
                if (rawCity.trim()) addressParts.push(rawCity.trim());
                if (rawState.trim()) addressParts.push(rawState.trim());
                
                const fullAddressString = addressParts.join(', ');
                if (fullAddressString) {
                    createDetailRow('FULL ADDRESS', fullAddressString);
                }

                // 3. Loop through remaining headers, bypassing variables already manually handled
                headers.forEach(header => {
                    const upperHeader = header.toUpperCase();
                    
                    // Strips column 1 completely from the displayed layout output
                    if (header === firstColumnHeader || header === secondColumnHeader || upperHeader === 'ADDRESS' || upperHeader === 'CITY' || upperHeader === 'STATE') {
                        return; 
                    }
                    createDetailRow(header, rowData[header]);
                });

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
